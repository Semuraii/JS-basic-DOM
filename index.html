<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM manipulation</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
    <h1>Dead by Daylight Generator</h1>

    <nav>
        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#generators">Generators</a></li>
            <li><a href="#survivors">Survivors</a></li>
            <li><a href="#killers">Killers</a></li>
        </ul>
    </nav>
    </header>

    <main>
        <section class="hero" id="home">
            <div class="overlay">
                <h2 class="fade-text">
                    Welcome to the Fog!
                </h2>

                <p>
                    Opplev spenningen i Dead by Daylight.
                    Generer en tilfeldig killer eller survivor
                </p>

                <a href="#generator" class="btn">
                    Get started!
                </a>
            </div>
        </section>

        <section class="generator" id="generator">
            <div class="title">
            <h2>Generator</h2>
            <p>
                Trykk på knappen for å generere en tilfeldig match!
            </p>
            </div>
            <div class="generator-content">
            <button id="generate-btn" class="btn">
                Generer match
            </button>
            <div id="result"></div>
            <div id="history"></div>
            </div>
        </div>
        </section>

        <section id="killers">
            <div class="title">
                <h2>Killers</h2>
                <p>
                    Velg din favoritt killer!
                </p>
            </div>

            <div class="container">
                <article class="character-card">
                    <img src="images/trapper.png" 
                    alt="trapper from dead by daylight">
                </article>
            </div>
        </section>
    </main>

</body>
</html>
